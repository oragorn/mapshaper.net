name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Install mapshaper
        run: npm install -g mapshaper

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "release_notes=See https://github.com/oragorn/mapshaper.net/releases/tag/$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "package_version=0.0.0-ci" >> "$GITHUB_OUTPUT"
            echo "release_notes=See https://github.com/oragorn/mapshaper.net/blob/main/CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: dotnet pack Mapshaper.Net/Mapshaper.Net.csproj --configuration Release --no-build --output artifacts /p:PackageVersion=${{ steps.version.outputs.package_version }} /p:PackageReleaseNotes="${{ steps.version.outputs.release_notes }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: NuGet login
        if: startsWith(github.ref, 'refs/tags/v')
        uses: NuGet/login@v1.2.0
        id: login
        with:
          user: sidz

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish symbols to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push "artifacts/*.snupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            $0 ~ "^## " version "([[:space:]]|-)" { in_section=1; next }
            in_section && /^## / { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "No changelog entry found for $version." > release-notes.md
          fi

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: gh release create "$GITHUB_REF_NAME" artifacts/*.nupkg artifacts/*.snupkg --title "Mapshaper.Net ${GITHUB_REF_NAME#v}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}
